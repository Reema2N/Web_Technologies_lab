<!DOCTYPE html>
<html>
<head>
    <title>Lab8 Task2</title>
</head>
<body>
    <h1>Books with edition > 3 and title or author contains "qu"</h1>

    {% if books %}
        <table border="1">
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Price</th>
                <th>Edition</th>
            </tr>

            {% for book in books %}
            <tr>
                <td>{{ book.title }}</td>
                <td>{{ book.author }}</td>
                <td>{{ book.price }}</td>
                <td>{{ book.edition }}</td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>No books found.</p>
    {% endif %}
</body>
</html>
